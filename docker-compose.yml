services:
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-cpp
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - ./models:/models
    restart: always
    ports:
      - "8001:8001"
    environment:
      HF_TOKEN: ${HF_TOKEN}
    command: >
      -m /models/Qwen3.5-9B-Q5_K_M.gguf
      --host 0.0.0.0
      --port 8001
      -ngl 99
      --cache-type-k q8_0
      --cache-type-v q8_0
      -c 32768
      --parallel 1
      --flash-attn on
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ingest:
    build: .
    command: python app/ingest.py
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      HF_TOKEN: ${HF_TOKEN}
      EMBED_MODEL: ${EMBED_MODEL}
      COLLECTION: ${COLLECTION}
      CHUNK_SIZE: ${CHUNK_SIZE}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP}
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      LLM_BASE_URL: http://llama-cpp:8001/v1
      EMBED_MODEL: ${EMBED_MODEL}
      COLLECTION: ${COLLECTION}
      TOP_K: ${TOP_K}
    depends_on:
      llama-cpp:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ingest:
        condition: service_completed_successfully
    restart: on-failure

volumes:
  pgdata:
